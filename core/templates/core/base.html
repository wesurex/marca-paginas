<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Histórias Guardadas{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #0f0f0f; color: #f0f0f0; min-height: 100vh; font-size: 15px; }
    h1, h2, h3, h4, h5, h6 { color: #ffffff; }
    p, span, li, td, th, label, .form-label { color: #e8e8e8; }
    .navbar { background-color: #1a1a2e !important; border-bottom: 1px solid #2d2d4e; }
    .navbar-brand { color: #7c5cbf !important; font-weight: 700; font-size: 1.3rem; }
    .nav-link { color: #d0c0f0 !important; }
    .nav-link:hover { color: #fff !important; }
    .card { background-color: #1a1a2e; border: 1px solid #2d2d4e; border-radius: 12px; }
    .card-header { background-color: #12122a; border-bottom: 1px solid #2d2d4e; }
    .card-body, .card-text { color: #f0f0f0; }
    .badge-livro { background-color: #2d6a4f; color: #fff; }
    .badge-manga { background-color: #7b3f9e; color: #fff; }
    .badge-manhwa { background-color: #b5451b; color: #fff; }
    .badge-manhua { background-color: #1a6b8a; color: #fff; }
    .btn-primary { background-color: #7c5cbf; border-color: #7c5cbf; color: #fff; }
    .btn-primary:hover { background-color: #6a4aad; border-color: #6a4aad; color: #fff; }
    .btn-outline-primary { color: #a882e8; border-color: #7c5cbf; }
    .btn-outline-primary:hover { background-color: #7c5cbf; color: #fff; }
    .btn-outline-secondary { color: #c0c0c0; border-color: #555; }
    .btn-outline-secondary:hover { background-color: #333; color: #fff; border-color: #888; }
    .form-control, .form-select { background-color: #12122a; border-color: #3d3d5e; color: #f0f0f0; }
    .form-control:focus, .form-select:focus { background-color: #12122a; border-color: #7c5cbf; color: #f0f0f0; box-shadow: 0 0 0 0.2rem rgba(124,92,191,0.25); }
    .form-control::placeholder { color: #888; }
    .form-select option { background-color: #1a1a2e; color: #f0f0f0; }
    .form-text { color: #aaa !important; }
    .capa-obra { width: 100%; max-width: 180px; border-radius: 8px; object-fit: cover; aspect-ratio: 2/3; background: #12122a; }
    .capa-placeholder { width: 180px; height: 270px; background: #12122a; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #555; font-size: 3rem; }
    .status-badge { font-size: 0.75rem; }
    .historico-item { border-left: 3px solid #7c5cbf; padding-left: 12px; margin-bottom: 10px; }
    .progress-bar { background-color: #7c5cbf; }
    .progress { background-color: #12122a; }
    a { color: #b89cf0; }
    a:hover { color: #d4beff; }
    .text-muted { color: #aaa !important; }
    .text-white { color: #fff !important; }
    small { color: #bbb; }
    .table { color: #f0f0f0; }
    .table-hover tbody tr:hover { background-color: #12122a; color: #f0f0f0; }
    hr { border-color: #2d2d4e; }
    .alert-success { background-color: #1a3a2e; border-color: #2d6a4f; color: #c5f0d0; }
    .alert-danger { background-color: #3a1a1a; border-color: #6a2d2d; color: #f0c5c5; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'index' %}">
      <i class="bi bi-bookmark-heart-fill me-2"></i>Histórias Guardadas
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'index' %}"><i class="bi bi-house me-1"></i>Início</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'obra_lista' %}"><i class="bi bi-collection me-1"></i>Biblioteca</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{% url 'obra_criar' %}"><i class="bi bi-plus-circle me-1"></i>Cadastrar</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
